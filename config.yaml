# 机场订阅
proxy-providers:
  Airport1:
    url: "https://sub1.sntp.me/baseStr?token=18a0d35e2eee7c0e457ed3b9c7ff15b4&sign=2cae81f66d023a3e6f5404e51b4f8fc5&ts=1769522222&nonce=9f8f16e7d3bb119a2604bb3ecce6ae25&v=v2&timestamp=140642"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    exclude-filter: "2\\.00x|3\\.00x|5\\.00x"
    override:
      client-fingerprint: chrome
      udp: true

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: info
find-process-mode: 'off' #always/strict
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: metacubexd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# 入站
tun:
  enable: true
  stack: mixed # system/gvisor
  dns-hijack: ["any:53", "tcp://any:53"]
  device: mihomo
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "ruleset:fakeipfilter_domain"
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#美国自动策略&ecs=223.5.5.0/24
    - https://1.1.1.1/dns-query

# 锚点 - 节点筛选组
FilterHK: &FilterHK '^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterTW: &FilterTW '^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterJP: &FilterJP '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterKR: &FilterKR '^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterSG: &FilterSG '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterUS: &FilterUS '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterUK: &FilterUK '^(?=.*((?i)🇬🇧|英国|伦敦|(\b(UK|GBR|United Kingdom)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterFR: &FilterFR '^(?=.*((?i)🇫🇷|法国|(\b(FR|FRA|France)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterDE: &FilterDE '^(?=.*((?i)🇩🇪|德国|(\b(DE|DEU|Germany)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic)(\d+)?\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$'

# 策略组参数锚点
# 锚点 - 时延优选参数 [每 6 秒一次惰性健康检查，容差 20ms，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
UrlTest: &UrlTest {type: url-test, interval: 6, tolerance: 20, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# 锚点 - 故障转移参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
FallBack: &FallBack {type: fallback, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# 锚点 - 负载均衡参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance: &LoadBalance {type: load-balance, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}

# 出站策略
proxy-groups:
  - {name: 🌐 全部节点, type: select, filter: *FilterAll}
  - {name: 🇭🇰 香港节点, type: select, filter: *FilterHK}
  - {name: 🇺🇲 美国节点, type: select, filter: *FilterUS}
  - {name: 香港自动策略, <<: *UrlTest, filter: *FilterHK}
  - {name: 台湾自动策略, <<: *UrlTest, filter: *FilterTW}
  - {name: 日本自动策略, <<: *UrlTest, filter: *FilterJP}
  - {name: 韩国自动策略, <<: *UrlTest, filter: *FilterKR}
  - {name: 新国自动策略, <<: *UrlTest, filter: *FilterSG}
  - {name: 美国自动策略, <<: *UrlTest, filter: *FilterUS}
  - {name: 英国自动策略, <<: *UrlTest, filter: *FilterUK}
  - {name: 法国自动策略, <<: *UrlTest, filter: *FilterFR}
  - {name: 德国自动策略, <<: *UrlTest, filter: *FilterDE}
  - {name: 兜底后备策略, type: fallback, proxies: [香港自动策略, 台湾自动策略, 日本自动策略, 韩国自动策略, 新国自动策略, 美国自动策略, 英国自动策略, 法国自动策略, 德国自动策略]}

# 规则匹配
rules:
  - DOMAIN-SUFFIX,ts.net,直连
  - IP-CIDR,100.64.0.0/10,直连
  - DOMAIN-SUFFIX,cn2gias.uk,直连
  - DOMAIN-SUFFIX,lilyemby.com,直连
  - DOMAIN,link01.okemby.org,🇭🇰 香港节点
  - DOMAIN-SUFFIX,okemby.org,直连
  - DOMAIN-SUFFIX,bangumi.ca,直连
  - RULE-SET,rejectAd_domain,REJECT
  - RULE-SET,private_domain,直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,ai,美国自动策略
  - RULE-SET,category-game-platforms-download_domain,直连
  - RULE-SET,apple_domain,美国自动策略
  - RULE-SET,apple_ip,美国自动策略,no-resolve
  - RULE-SET,paypal_domain,🇺🇲 美国节点
  - RULE-SET,geolocation-!cn,美国自动策略
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,兜底后备策略

# 规则集
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
rule-providers:
  rejectAd_domain: { <<: *class, url: "https://github.com/fmz200/wool_scripts/raw/main/Loon/rule/rejectAd.list"}
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
